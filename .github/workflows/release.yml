name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        run: |
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" | tar -xJ
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-shm0-dev libxcb-xkb-dev \
            libxcb-util-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb-imdkit-dev

      - name: Build
        run: zig build -Dbackend=x11 -Doptimize=ReleaseSmall

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zt-x86_64-linux
          path: zig-out/bin/zt

  build-aarch64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        run: |
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" | tar -xJ
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"

      - name: Enable multiarch and install aarch64 dependencies
        run: |
          sudo dpkg --add-architecture arm64
          # Restrict existing sources to amd64
          sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          # Add arm64 from ports
          cat <<'SOURCES' | sudo tee /etc/apt/sources.list.d/arm64-ports.sources
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-security
          Components: main restricted universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          SOURCES
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev:arm64 libxcb-shm0-dev:arm64 libxcb-xkb-dev:arm64 \
            libxcb-util-dev:arm64 libxkbcommon-dev:arm64 libxkbcommon-x11-dev:arm64 \
            libxcb-imdkit-dev:arm64

      - name: Create aarch64 sysroot
        run: |
          mkdir -p /tmp/aarch64-sysroot
          ln -s /usr/lib/aarch64-linux-gnu /tmp/aarch64-sysroot/lib
          ln -s /usr/include /tmp/aarch64-sysroot/include

      - name: Build
        run: |
          zig build -Dbackend=x11 -Doptimize=ReleaseSmall \
            -Dtarget=aarch64-linux-gnu.2.38 \
            --search-prefix /tmp/aarch64-sysroot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zt-aarch64-linux
          path: zig-out/bin/zt

  release:
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Rename binaries
        run: |
          mv zt-x86_64-linux/zt zt-x86_64-linux-x11
          mv zt-aarch64-linux/zt zt-aarch64-linux-x11
          chmod +x zt-*-linux-x11

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            zt-x86_64-linux-x11 \
            zt-aarch64-linux-x11
